<!DOCTYPE html>
<html lang="en">

<head>
    <title>Diabetes Prediction</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="card shadow p-4">

        <h2 class="text-center text-primary">
            Diabetes Prediction
        </h2>

        <img src="{{ url_for('static', filename='images/Diabetes.png') }}" class="img-fluid mb-3" alt="Healthcare illustration showing a person checking blood glucose in a clinical setting with Diabetes Prediction text and a calm informative tone">

        <form action="/predict_diabetes" method="POST">

            <div class="row">

                <div class="col-md-6 mb-3">
                    <label>Pregnancies</label>
                    <input type="number" class="form-control" name="Pregnancies" required>
                </div>

                <div class="col-md-6 mb-3">
                    <label>Glucose</label>
                    <input type="number" class="form-control" name="Glucose" required>
                </div>

                <div class="col-md-6 mb-3">
                    <label>Blood Pressure</label>
                    <input type="number" class="form-control" name="BloodPressure" required>
                </div>

                <div class="col-md-6 mb-3">
                    <label>Skin Thickness</label>
                    <input type="number" class="form-control" name="SkinThickness" required>
                </div>

                <div class="col-md-6 mb-3">
                    <label>Insulin</label>
                    <input type="number" class="form-control" name="Insulin" required>
                </div>

                <div class="col-md-6 mb-3">
                    <label>BMI</label>
                    <input type="number" step="0.01" class="form-control" name="BMI" required>
                </div>

                <div class="col-md-6 mb-3">
                    <label>Diabetes Pedigree Function</label>
                    <input type="number" step="0.001" class="form-control" name="DPF" required>
                </div>

                <div class="col-md-6 mb-3">
                    <label>Age</label>
                    <input type="number" class="form-control" name="Age" required>
                </div>

            </div>

            <button class="btn btn-primary w-100">
                Predict Diabetes
            </button>

        </form>

    </div>

</div>

</body>
</html>
