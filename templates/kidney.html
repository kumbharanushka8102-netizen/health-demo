<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kidney Disease Prediction</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container py-5">

    <div class="card shadow-lg p-4">

        <h2 class="text-center text-success mb-4">
            Kidney Disease Prediction
        </h2>

        <form action="/predict_kidney" method="POST">

            <div class="row">

                <div class="col-md-3 mb-3">
                    <label class="form-label">Age</label>
                    <input type="number" name="age" class="form-control" required>
                </div>

                <div class="col-md-3 mb-3">
                    <label class="form-label">Blood Pressure</label>
                    <input type="number" name="bp" class="form-control" required>
                </div>

                <div class="col-md-3 mb-3">
                    <label class="form-label">Specific Gravity</label>
                    <input type="number" step="0.001" name="sg" class="form-control" required>
                </div>

                <div class="col-md-3 mb-3">
                    <label class="form-label">Albumin</label>
                    <input type="number" name="al" class="form-control" required>
                </div>

                <div class="col-md-3 mb-3">
                    <label class="form-label">Sugar</label>
                    <input type="number" name="su" class="form-control" required>
                </div>

                <div class="col-md-3 mb-3">
                    <label class="form-label">RBC</label>
                    <select name="rbc" class="form-select">
                        <option value="1">Normal</option>
                        <option value="0">Abnormal</option>
                    </select>
                </div>

                <div class="col-md-3 mb-3">
                    <label class="form-label">Pus Cell</label>
                    <select name="pc" class="form-select">
                        <option value="1">Normal</option>
                        <option value="0">Abnormal</option>
                    </select>
                </div>

                <div class="col-md-3 mb-3">
                    <label class="form-label">Pus Cell Clumps</label>
                    <select name="pcc" class="form-select">
                        <option value="1">Present</option>
                        <option value="0">Not Present</option>
                    </select>
                </div>

                <div class="col-md-3 mb-3">
                    <label class="form-label">Bacteria</label>
                    <select name="ba" class="form-select">
                        <option value="1">Present</option>
                        <option value="0">Not Present</option>
                    </select>
                </div>

                <div class="col-md-3 mb-3">
                    <label class="form-label">Blood Glucose Random</label>
                    <input type="number" name="bgr" class="form-control" required>
                </div>

                <div class="col-md-3 mb-3">
                    <label class="form-label">Blood Urea</label>
                    <input type="number" name="bu" class="form-control" required>
                </div>

                <div class="col-md-3 mb-3">
                    <label class="form-label">Serum Creatinine</label>
                    <input type="number" step="0.1" name="sc" class="form-control" required>
                </div>

                <div class="col-md-3 mb-3">
                    <label class="form-label">Sodium</label>
                    <input type="number" name="sod" class="form-control" required>
                </div>

                <div class="col-md-3 mb-3">
                    <label class="form-label">Potassium</label>
                    <input type="number" step="0.1" name="pot" class="form-control" required>
                </div>

                <div class="col-md-3 mb-3">
                    <label class="form-label">Hemoglobin</label>
                    <input type="number" step="0.1" name="hemo" class="form-control" required>
                </div>

                <div class="col-md-3 mb-3">
                    <label class="form-label">Packed Cell Volume</label>
                    <input type="number" name="pcv" class="form-control" required>
                </div>

                <div class="col-md-3 mb-3">
                    <label class="form-label">White Blood Cell Count</label>
                    <input type="number" name="wc" class="form-control" required>
                </div>

                <div class="col-md-3 mb-3">
                    <label class="form-label">Red Blood Cell Count</label>
                    <input type="number" step="0.1" name="rc" class="form-control" required>
                </div>

                <div class="col-md-3 mb-3">
                    <label class="form-label">Hypertension</label>
                    <select name="htn" class="form-select">
                        <option value="1">Yes</option>
                        <option value="0">No</option>
                    </select>
                </div>

                <div class="col-md-3 mb-3">
                    <label class="form-label">Diabetes Mellitus</label>
                    <select name="dm" class="form-select">
                        <option value="1">Yes</option>
                        <option value="0">No</option>
                    </select>
                </div>

                <div class="col-md-3 mb-3">
                    <label class="form-label">Coronary Artery Disease</label>
                    <select name="cad" class="form-select">
                        <option value="1">Yes</option>
                        <option value="0">No</option>
                    </select>
                </div>

                <div class="col-md-3 mb-3">
                    <label class="form-label">Appetite</label>
                    <select name="appet" class="form-select">
                        <option value="1">Good</option>
                        <option value="0">Poor</option>
                    </select>
                </div>

                <div class="col-md-3 mb-3">
                    <label class="form-label">Pedal Edema</label>
                    <select name="pe" class="form-select">
                        <option value="1">Yes</option>
                        <option value="0">No</option>
                    </select>
                </div>

                <div class="col-md-3 mb-3">
                    <label class="form-label">Anemia</label>
                    <select name="ane" class="form-select">
                        <option value="1">Yes</option>
                        <option value="0">No</option>
                    </select>
                </div>

            </div>

            <button type="submit" class="btn btn-success w-100 mt-3">
                Predict Kidney Disease
            </button>

        </form>

    </div>

</div>

</body>
</html>
